    '@commitlint/config-conventional': ^20.5.3
    '@commitlint/types': ^20.5.0
    '@lerna-lite/cli': ^5.2.1
    '@lerna-lite/publish': ^5.2.1
    '@types/node': ^25.6.2
    husky: ^9.1.7
    lint-staged: ^16.4.0
    rimraf: ^6.1.3
    typescript: ^6.0.3
    tsdown: ^0.22.0
  dev-test:
    vue: ^3.5.34
  eslint:
    '@meteorlxy/eslint-config': ^7.5.0
    eslint: ^10.3.0
    eslint-plugin-vue: ^10.9.1
    vue-eslint-parser: ^10.4.0
  oxfmt:
    oxfmt: ^0.48.0
  prettier:
    prettier: ^3.8.3
